<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAharTV+ · Ultra Stable</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    
    <style>
        /* ========== الأنماط الأساسية ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #fff; }
        
        /* تحسينات للتحكم عن بعد */
        .focusable:focus {
            outline: 3px solid #ffd700 !important;
            outline-offset: 2px;
            transform: scale(1.02);
            transition: all 0.1s ease;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        
        .channel:focus, .package:focus, .side-menu-items li:focus {
            background: rgba(255, 215, 0, 0.15);
            border-color: #ffd700;
        }
        
        /* مؤشر التركيز الافتراضي */
        :focus {
            outline: none;
        }
        
        /* ========== صفحة الدخول الأولى ========== */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #1a1a1a, #000000);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: splashFadeIn 1.2s ease-out;
            overflow: hidden;
            padding: 20px;
        }

        .splash-screen::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.15) 0%, transparent 70%);
            animation: rotateGlow 20s linear infinite;
            z-index: -1;
        }

        .splash-logo-wrapper {
            position: relative;
            margin-bottom: 30px;
            animation: logoFloat 3s ease-in-out infinite;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .splash-logo {
            font-size: clamp(40px, 15vw, 80px);
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
            position: relative;
            letter-spacing: 2px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            line-height: 1.2;
            word-break: break-word;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .splash-logo .logo-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .splash-logo i {
            font-size: clamp(45px, 16vw, 90px);
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.7));
        }

        .splash-logo .logo-text {
            background: linear-gradient(135deg, #ffd700, #fff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: clamp(35px, 12vw, 70px);
            font-weight: 900;
            text-transform: uppercase;
        }

        .splash-logo .logo-plus {
            background: linear-gradient(135deg, #ffaa00, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: clamp(40px, 14vw, 75px);
            font-weight: 900;
            margin-left: 5px;
        }

        .splash-subtitle {
            font-size: clamp(14px, 4vw, 18px);
            color: rgba(255,255,255,0.8);
            margin: 15px 0;
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: subtitlePulse 2s infinite;
            text-align: center;
            padding: 0 10px;
        }

        .splash-decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .splash-decoration span {
            position: absolute;
            background: rgba(255,215,0,0.1);
            border-radius: 50%;
            filter: blur(30px);
            animation: decorationFloat 8s infinite;
        }

        .splash-decoration span:nth-child(1) {
            width: min(200px, 40vw);
            height: min(200px, 40vw);
            top: -50px;
            left: -50px;
            background: rgba(255,215,0,0.15);
            animation-delay: 0s;
        }

        .splash-decoration span:nth-child(2) {
            width: min(300px, 50vw);
            height: min(300px, 50vw);
            bottom: -100px;
            right: -100px;
            background: rgba(255,215,0,0.1);
            animation-delay: 2s;
        }

        .splash-decoration span:nth-child(3) {
            width: min(150px, 30vw);
            height: min(150px, 30vw);
            top: 50%;
            left: 30%;
            background: rgba(255,215,0,0.2);
            animation-delay: 4s;
        }

        .splash-button {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            border: none;
            padding: clamp(15px, 4vw, 18px) clamp(40px, 10vw, 60px);
            font-size: clamp(18px, 5vw, 22px);
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
            animation: buttonPulse 2s infinite;
            border: 2px solid rgba(255,255,255,0.3);
            width: auto;
            max-width: 90%;
            justify-content: center;
        }

        .splash-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s ease;
        }

        .splash-button:hover::before {
            left: 100%;
        }

        .splash-button:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 0 50px rgba(255,215,0,0.8);
            background: linear-gradient(135deg, #ffaa00, #ffd700);
        }

        .splash-button:active {
            transform: scale(0.95);
        }

        .splash-button i:first-child {
            font-size: clamp(16px, 4vw, 20px);
        }

        .splash-button i:last-child {
            font-size: clamp(14px, 3.5vw, 18px);
        }

        .splash-footer {
            position: absolute;
            bottom: 20px;
            color: rgba(255,255,255,0.3);
            font-size: clamp(10px, 3vw, 14px);
            letter-spacing: 2px;
            text-align: center;
            padding: 0 10px;
        }

        @keyframes splashFadeIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        @keyframes subtitlePulse {
            0%, 100% { opacity: 0.6; text-shadow: 0 0 10px rgba(255,215,0,0.3); }
            50% { opacity: 1; text-shadow: 0 0 20px rgba(255,215,0,0.6); }
        }

        @keyframes buttonPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(255,215,0,0.5); }
            50% { box-shadow: 0 0 60px rgba(255,215,0,0.9); }
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes decorationFloat {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            50% { transform: translate(30px, -30px) scale(1.2); opacity: 0.2; }
        }

        .splash-screen.hide {
            animation: splashFadeOut 0.5s ease forwards;
        }

        .splash-screen.permanent-hide {
            display: none !important;
        }

        @keyframes splashFadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        #main-content, #navbar {
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        body.splash-hidden #main-content,
        body.splash-hidden #navbar {
            opacity: 1;
        }

        @media (max-width: 480px) {
            .splash-logo .logo-top {
                gap: 5px;
            }
            
            .splash-button {
                padding: 15px 30px;
                font-size: 18px;
            }
            
            .splash-button i:first-child,
            .splash-button i:last-child {
                font-size: 16px;
            }
        }

        /* ========== الباقات ========== */
        .packages { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 15px; padding: 15px; }
        .package { background: #111; border-radius: 15px; padding: 15px 10px; text-align: center; cursor: pointer; transition: .1s; position: relative; }
        .package:active { background: #1c1c1c; transform: scale(0.98); }
        .package img { width: 100px; height: 100px; object-fit: contain; margin-bottom: 10px; border-radius: 10px; background: #1a1a1a; padding: 5px; }
        .package-name { font-size: 12px; font-weight: 600; color: #909090; letter-spacing: 0.3px; }
        
        /* ========== نجمة المفضلة ========== */
        .package-favorite { position: absolute; top: -15px; right: -15px; width: 70px; height: 70px; background: radial-gradient(circle at 30% 30%, #ffd700, #ffaa00); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 35px; cursor: pointer; border: 4px solid #fff; box-shadow: 0 0 40px rgba(255,215,0,0.9); z-index: 10; animation: bigStarPulse 2s infinite; }
        .package-favorite:hover { transform: scale(1.2) rotate(15deg); }
        .package-favorite span { position: absolute; bottom: -5px; right: -5px; background: #000; color: #ffd700; font-size: 18px; font-weight: bold; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid #ffd700; animation: countPulse 1.5s infinite; }
        @keyframes bigStarPulse { 0% { box-shadow: 0 0 30px rgba(255,215,0,0.7); } 50% { box-shadow: 0 0 60px rgba(255,215,0,1); } 100% { box-shadow: 0 0 30px rgba(255,215,0,0.7); } }
        @keyframes countPulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        
        /* ========== الشريط العلوي ========== */
        #navbar { position: fixed; top: 0; left: 0; width: 100%; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; padding: 12px 20px; z-index: 1000; height: 60px; border-bottom: 1px solid #222; }
        #navbar .logo { font-size: 22px; font-weight: bold; color: #ffd700; display: flex; align-items: center; gap: 12px; position: absolute; left: 50%; transform: translateX(-50%); }
        .menu-btn { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); font-size: 24px; color: #ffd700; cursor: pointer; }
        
        /* ========== القائمة الجانبية ========== */
        #side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #111; transition: left 0.2s ease; padding-top: 70px; z-index: 2001; border-right: 1px solid #222; }
        #side-menu.active { left: 0; }
        .side-menu-header { padding: 20px; border-bottom: 1px solid #222; text-align: center; }
        .side-menu-header h3 { color: #ffd700; font-size: 18px; margin-bottom: 5px; }
        .side-menu-items { list-style: none; }
        .side-menu-items li { padding: 15px 20px; color: #fff; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .side-menu-items li:hover { background: rgba(255, 215, 0, 0.1); color: #ffd700; }
        .side-menu-footer { position: absolute; bottom: 0; width: 100%; padding: 20px; border-top: 1px solid #222; color: #888; font-size: 12px; text-align: center; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 2000; display: none; }
        .overlay.active { display: block; }
        
        /* ========== المحتوى الرئيسي (الباقات) ========== */
        #main-content { margin-top: 70px; height: calc(100vh - 70px); overflow-y: auto; background: #000; display: block; }
        .packages-footer { text-align: center; padding: 20px 15px; background: #0a0a0a; border-top: 1px solid #222; margin-top: 20px; color: #666; font-size: 12px; }
        
        /* ========== قسم المشغل ========== */
        .player-section { display: none; width: 100vw; height: 100vh; background: #000; position: fixed; top: 0; left: 0; z-index: 2000; }
        .player-section.active { display: flex; flex-direction: column; }
        .video-area { flex: 0 0 45%; width: 100%; background: #000; position: relative; overflow: hidden; cursor: pointer; }
        
        @media (orientation: landscape) {
            .player-section.active { flex-direction: row; }
            .video-area { flex: 0 0 65%; height: 100vh; }
            .channels-area { flex: 0 0 35%; height: 100vh; border-left: 1px solid #222; }
        }
        
        /* ========== قائمة القنوات ========== */
        .channels-area { flex: 0 0 55%; width: 100%; background: #0a0a0a; display: flex; flex-direction: column; overflow: hidden; }
        .channels-list-container { flex: 1; overflow-y: auto; padding: 15px; }
        #channelsList { display: flex !important; flex-direction: column !important; gap: 10px; }
        
        /* ========== عنصر القناة ========== */
        .channel { width: 100%; display: flex; align-items: center; padding: 12px 15px; background: #111; border-radius: 12px; cursor: pointer; border: 1px solid #222; transition: all 0.2s ease; position: relative; user-select: none; }
        .channel.active { border-color: #ffd700; background: linear-gradient(135deg, rgba(255,215,0,0.15) 0%, rgba(255,215,0,0.05) 100%); box-shadow: 0 0 15px rgba(255,215,0,0.3); transform: scale(1.02); }
        .channel.active .channel-title { color: #ffd700; font-weight: bold; }
        .channel.error { border-color: #ff4444; background: rgba(255,68,68,0.1); }
        .channel.dragging { opacity: 0.8; transform: scale(1.02) rotate(1deg); background: #222; border: 2px dashed #ffd700; z-index: 10000; cursor: grabbing; }
        .channel.drag-over { border: 2px solid #ffd700; transform: translateY(5px); background: rgba(255,215,0,0.15); }
        
        .channel-logo { width: 50px; height: 50px; object-fit: contain; margin-right: 15px; border-radius: 8px; background: #1a1a1a; padding: 3px; }
        .channel-content { flex: 1; min-width: 0; }
        .channel-title { font-size: 15px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
        .channel-category { font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* ========== مقبض السحب ========== */
        .drag-handle { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; color: #666; font-size: 20px; margin-left: 8px; cursor: grab; transition: all 0.2s ease; border-radius: 8px; touch-action: none; }
        .drag-handle:hover { color: #ffd700; background: rgba(255,215,0,0.1); }
        
        /* ========== زر المفضلة ========== */
        .channel-favorite { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); border-radius: 50%; color: #aaa; font-size: 22px; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); margin-left: 10px; border: 2px solid #444; backdrop-filter: blur(10px); }
        .channel-favorite:hover { transform: scale(1.2) rotate(15deg); border-color: #ffd700; box-shadow: 0 0 30px rgba(255,215,0,0.6); background: rgba(255,215,0,0.15); }
        .channel-favorite.active { color: #ffd700; background: rgba(255,215,0,0.25); border-color: #ffd700; animation: starPop 0.5s ease; box-shadow: 0 0 20px #ffd700; }
        @keyframes starPop { 0% { transform: scale(1); } 30% { transform: scale(1.4); } 60% { transform: scale(0.9); } 100% { transform: scale(1); } }
        
        /* ========== عناصر المشغل ========== */
        #videoPlayer { width: 100%; height: 100%; background: #000; display: block; object-fit: cover; }
        #watermark { position: absolute; width: 70px; height: 25px; bottom: 15px; left: 15px; opacity: 0.5; z-index: 10; pointer-events: none; }
        
        .channel-loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 0; visibility: hidden; transition: opacity 0.2s ease; }
        .channel-loading-overlay.active { opacity: 1; visibility: visible; }
        
        .loading-spinner-modern { width: 60px; height: 60px; position: relative; }
        .spinner-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 3px solid transparent; animation: spin 0.5s infinite; }
        .spinner-ring:nth-child(1) { border-top-color: #ffd700; animation-delay: -0.3s; }
        .spinner-ring:nth-child(2) { border-top-color: #4CAF50; width: 80%; height: 80%; top: 10%; left: 10%; animation-delay: -0.15s; }
        .spinner-ring:nth-child(3) { border-top-color: #2196F3; width: 60%; height: 60%; top: 20%; left: 20%; animation-delay: 0s; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .channel-name-display { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); color: #ffd700; padding: 10px 20px; border-radius: 30px; font-size: 16px; font-weight: bold; border: 1px solid rgba(255,215,0,0.5); z-index: 50; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.2s ease; }
        .channel-name-display.visible { opacity: 1; visibility: visible; transform: translateY(0); }
        
        .epg-info { position: absolute; bottom: 15px; right: 15px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); color: #ffd700; padding: 8px 15px; border-radius: 20px; font-size: 12px; border: 1px solid rgba(255,215,0,0.3); z-index: 50; max-width: 70%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* ========== شريط السيرفر ========== */
        .server-badge { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            color: rgba(255, 215, 0, 0.9);
            padding: 8px 15px; 
            border-radius: 30px; 
            font-size: 14px; 
            border: 1px solid rgba(255, 215, 0, 0.3);
            z-index: 100; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            cursor: pointer; 
            transition: all 0.2s ease;
            pointer-events: auto;
            opacity: 0.8;
        }
        
        .server-badge:hover {
            background: rgba(0, 0, 0, 0.6);
            opacity: 1;
            border-color: rgba(255, 215, 0, 0.8);
        }
        
        .server-badge:active { 
            transform: scale(0.95); 
        }
        
        .server-badge i { 
            font-size: 14px; 
            opacity: 0.9;
        }
        
        .server-badge.locked { 
            border-color: rgba(255, 68, 68, 0.5); 
            color: rgba(255, 68, 68, 0.9); 
        }
        
        /* ========== أزرار الشاشة الكاملة ========== */
        .fullscreen-btn, .exit-fullscreen { 
            position: absolute; 
            bottom: 25px; 
            right: 25px; 
            background: rgba(0,0,0,0.5);
            color: rgba(255,255,255,0.8); 
            border: 1px solid rgba(255,215,0,0.3); 
            width: 55px; 
            height: 55px; 
            border-radius: 50%; 
            cursor: pointer; 
            font-size: 26px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(5px); 
            z-index: 20; 
            transition: all 0.2s ease;
            opacity: 0.7;
        }
        
        .exit-fullscreen { 
            top: 25px; 
            right: 25px; 
            bottom: auto; 
            display: none; 
            border-color: rgba(255,215,0,0.5);
            background: rgba(0,0,0,0.6);
        }
        
        .fullscreen-btn:hover, .exit-fullscreen:hover { 
            background: rgba(255,215,0,0.2); 
            border-color: #ffd700; 
            color: #ffd700; 
            transform: scale(1.1);
            opacity: 1;
        }
        
        /* ========== مؤشر إعادة الاتصال ========== */
        .reconnect-indicator { 
            position: absolute; 
            bottom: 80px; 
            right: 25px; 
            background: rgba(255, 68, 68, 0.7); 
            color: white; 
            padding: 8px 15px; 
            border-radius: 20px; 
            font-size: 12px; 
            z-index: 30; 
            display: none; 
            align-items: center; 
            gap: 8px; 
            backdrop-filter: blur(5px); 
            border: 1px solid rgba(255,68,68,0.5); 
            animation: pulse 1.5s infinite; 
        }
        .reconnect-indicator i { animation: spin 1s linear infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        
        /* ========== المؤشر الشامل ========== */
        #comprehensive-indicator { 
            position: fixed; 
            top: 70px; 
            right: 15px; 
            background: rgba(0,0,0,0.7); 
            color: #fff; 
            padding: 10px 15px; 
            border-radius: 25px; 
            font-size: 12px; 
            z-index: 1001; 
            border: 1px solid rgba(255,215,0,0.3); 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
            backdrop-filter: blur(10px); 
            min-width: 200px;
            opacity: 0.9;
            pointer-events: none;
            display: none;
        }
        
        .player-section.active + #comprehensive-indicator,
        #comprehensive-indicator.visible { 
            display: flex !important; 
        }
        
        .empty-favorites { text-align: center; padding: 50px 20px; color: #666; font-size: 16px; background: #111; border-radius: 15px; border: 1px dashed #333; }
        .empty-favorites i { font-size: 50px; color: #333; margin-bottom: 20px; }
        .double-tap-area { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 15; background: transparent; }
        
        /* ========== الشاشة الكاملة ========== */
        .fullscreen-mode, .fullscreen-mode body { overflow: hidden !important; position: fixed !important; width: 100% !important; height: 100% !important; }

    <script>
        // ==================== نظام التحكم عن بعد المتكامل ====================
        class RemoteControlSystem {
            constructor() {
                this.focusableElements = [];
                this.currentFocusIndex = -1;
                this.currentMode = 'packages'; // packages, channels, menu
                this.numberBuffer = '';
                this.numberTimeout = null;
                this.pageSize = 10; // عدد العناصر في الصفحة الواحدة
                this.currentPage = 1;
                this.totalPages = 1;
                this.init();
            }
            
            init() {
                // إضافة مستمعي الأحداث للتحكم عن بعد
                document.addEventListener('keydown', (e) => this.handleKeyDown(e));
                
                // إضافة خاصية التركيز لجميع العناصر القابلة للتركيز
                this.setupFocusableElements();
                
                // تحديث العناصر القابلة للتركيز عند تغيير المحتوى
                this.observeDOMChanges();
            }
            
            setupFocusableElements() {
                // إضافة tabindex للعناصر القابلة للتركيز
                document.querySelectorAll('.package, .channel, .side-menu-items li, .menu-btn, .server-badge, .fullscreen-btn, .exit-fullscreen').forEach(el => {
                    if (!el.hasAttribute('tabindex')) {
                        el.setAttribute('tabindex', '0');
                        el.classList.add('focusable');
                    }
                });
            }
            
            observeDOMChanges() {
                const observer = new MutationObserver(() => {
                    this.setupFocusableElements();
                    this.updateFocusableList();
                });
                
                observer.observe(document.body, {
                    childList: true,
                    subtree: true
                });
            }
            
            updateFocusableList() {
                if (this.currentMode === 'packages') {
                    this.focusableElements = Array.from(document.querySelectorAll('.package:not(.package-favorite)'));
                } else if (this.currentMode === 'channels') {
                    this.focusableElements = Array.from(document.querySelectorAll('.channel'));
                } else if (this.currentMode === 'menu') {
                    this.focusableElements = Array.from(document.querySelectorAll('.side-menu-items li'));
                }
                
                // إضافة الأزرار العامة
                const generalButtons = Array.from(document.querySelectorAll('.menu-btn, .server-badge, .fullscreen-btn, .exit-fullscreen'));
                this.focusableElements = [...this.focusableElements, ...generalButtons];
                
                this.totalPages = Math.ceil(this.focusableElements.length / this.pageSize);
            }
            
            handleKeyDown(e) {
                const key = e.key;
                
                // تجاهل الأحداث إذا كان المستخدم يكتب في حقل نصي
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                
                // منع التمرير الافتراضي للصفحة
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'PageUp', 'PageDown', 'Home', 'End'].includes(key)) {
                    e.preventDefault();
                }
                
                // معالجة الأزرار الرقمية
                if (key >= '0' && key <= '9') {
                    this.handleNumberKey(key);
                    return;
                }
                
                switch(key) {
                    case 'ArrowUp':
                        this.navigateUp();
                        break;
                    case 'ArrowDown':
                        this.navigateDown();
                        break;
                    case 'ArrowLeft':
                        this.navigateLeft();
                        break;
                    case 'ArrowRight':
                        this.navigateRight();
                        break;
                    case 'Enter':
                    case ' ':
                        this.activateFocused();
                        break;
                    case 'Escape':
                    case 'Backspace':
                        this.handleBack();
                        break;
                    case 'PageUp':
                        this.scrollPage(-1);
                        break;
                    case 'PageDown':
                        this.scrollPage(1);
                        break;
                    case 'Home':
                        this.goToFirst();
                        break;
                    case 'End':
                        this.goToLast();
                        break;
                    case 'F1':
                    case 'Help':
                        this.showHelp();
                        break;
                    case 'MediaPlayPause':
                        this.togglePlayPause();
                        break;
                    case 'MediaStop':
                        this.stopPlayback();
                        break;
                    case 'MediaTrackPrevious':
                        this.prevChannel();
                        break;
                    case 'MediaTrackNext':
                        this.nextChannel();
                        break;
                    case 'Red':
                    case 'F2':
                        this.manualServerSwitch();
                        break;
                    case 'Green':
                    case 'F3':
                        this.toggleFavorite();
                        break;
                    case 'Yellow':
                    case 'F4':
                        this.toggleFullscreen();
                        break;
                    case 'Blue':
                    case 'F5':
                        this.toggleMenu();
                        break;
                    case 'Info':
                    case 'Display':
                        this.showInfo();
                        break;
                    case 'Exit':
                        this.handleBack();
                        break;
                }
            }
            
            handleNumberKey(key) {
                this.numberBuffer += key;
                
                // عرض المؤشر
                const indicator = document.getElementById('channelNumberIndicator');
                indicator.textContent = this.numberBuffer;
                indicator.style.display = 'block';
                
                // إعادة تعيين المؤقت
                if (this.numberTimeout) clearTimeout(this.numberTimeout);
                
                this.numberTimeout = setTimeout(() => {
                    this.processNumberBuffer();
                }, 1000);
            }
            
            processNumberBuffer() {
                const indicator = document.getElementById('channelNumberIndicator');
                indicator.style.display = 'none';
                
                if (this.numberBuffer && this.currentMode === 'channels') {
                    const channelNumber = parseInt(this.numberBuffer) - 1;
                    if (channelNumber >= 0 && channelNumber < this.focusableElements.length) {
                        this.focusableElements[channelNumber]?.click();
                    }
                }
                
                this.numberBuffer = '';
            }
            
            navigateUp() {
                if (this.focusableElements.length === 0) return;
                
                const gridCols = this.getGridColumns();
                if (gridCols > 1) {
                    // تنقل شبكي
                    this.currentFocusIndex = Math.max(0, this.currentFocusIndex - gridCols);
                } else {
                    // تنقل عمودي
                    this.currentFocusIndex = Math.max(0, this.currentFocusIndex - 1);
                }
                
                this.focusCurrent();
            }
            
            navigateDown() {
                if (this.focusableElements.length === 0) return;
                
                const gridCols = this.getGridColumns();
                if (gridCols > 1) {
                    this.currentFocusIndex = Math.min(this.focusableElements.length - 1, this.currentFocusIndex + gridCols);
                } else {
                    this.currentFocusIndex = Math.min(this.focusableElements.length - 1, this.currentFocusIndex + 1);
                }
                
                this.focusCurrent();
            }
            
            navigateLeft() {
                if (this.focusableElements.length === 0) return;
                
                if (this.currentMode === 'channels') {
                    // في وضع القنوات، الانتقال لليسار يعني القناة السابقة
                    this.prevChannel();
                } else {
                    this.currentFocusIndex = Math.max(0, this.currentFocusIndex - 1);
                    this.focusCurrent();
                }
            }
            
            navigateRight() {
                if (this.focusableElements.length === 0) return;
                
                if (this.currentMode === 'channels') {
                    // في وضع القنوات، الانتقال لليمين يعني القناة التالية
                    this.nextChannel();
                } else {
                    this.currentFocusIndex = Math.min(this.focusableElements.length - 1, this.currentFocusIndex + 1);
                    this.focusCurrent();
                }
            }
            
            getGridColumns() {
                if (this.currentMode === 'packages') {
                    const container = document.querySelector('.packages');
                    if (container) {
                        const style = window.getComputedStyle(container);
                        return style.gridTemplateColumns.split(' ').length;
                    }
                }
                return 1;
            }
            
            focusCurrent() {
                // إزالة التركيز من جميع العناصر
                this.focusableElements.forEach(el => el.blur());
                
                if (this.currentFocusIndex >= 0 && this.currentFocusIndex < this.focusableElements.length) {
                    const element = this.focusableElements[this.currentFocusIndex];
                    element.focus();
                    
                    // تمرير العنصر إلى视图
                    element.scrollIntoView({
                        behavior: 'smooth',
                        block: 'center',
                        inline: 'center'
                    });
                    
                    // تحديث مؤشر الصفحة
                    this.updatePageIndicator();
                }
            }
            
            activateFocused() {
                if (this.currentFocusIndex >= 0 && this.currentFocusIndex < this.focusableElements.length) {
                    this.focusableElements[this.currentFocusIndex].click();
                }
            }
            
            handleBack() {
                if (playerSection.classList.contains('active')) {
                    goBackToPackages();
                    this.setMode('packages');
                } else if (document.getElementById('side-menu').classList.contains('active')) {
                    toggleMenu();
                }
            }
            
            scrollPage(direction) {
                this.currentPage += direction;
                if (this.currentPage < 1) this.currentPage = 1;
                if (this.currentPage > this.totalPages) this.currentPage = this.totalPages;
                
                const startIndex = (this.currentPage - 1) * this.pageSize;
                if (startIndex < this.focusableElements.length) {
                    this.currentFocusIndex = startIndex;
                    this.focusCurrent();
                }
                
                this.showPageIndicator();
            }
            
            goToFirst() {
                this.currentFocusIndex = 0;
                this.focusCurrent();
            }
            
            goToLast() {
                this.currentFocusIndex = this.focusableElements.length - 1;
                this.focusCurrent();
            }
            
            setMode(mode) {
                this.currentMode = mode;
                this.currentFocusIndex = -1;
                this.updateFocusableList();
                
                // تركيز العنصر الأول بعد قليل
                setTimeout(() => {
                    if (this.focusableElements.length > 0) {
                        this.currentFocusIndex = 0;
                        this.focusCurrent();
                    }
                }, 100);
            }
            
            updatePageIndicator() {
                if (this.currentFocusIndex >= 0) {
                    this.currentPage = Math.floor(this.currentFocusIndex / this.pageSize) + 1;
                    this.showPageIndicator();
                }
            }
            
            showPageIndicator() {
                const indicator = document.getElementById('pageIndicator');
                indicator.textContent = `الصفحة ${this.currentPage} من ${this.totalPages}`;
                indicator.classList.add('visible');
                
                setTimeout(() => {
                    indicator.classList.remove('visible');
                }, 2000);
            }

                const helpMessage = `

                    Enter : تحديد
                    أرقام 0-9 : اختيار مباشر
                    PageUp/PageDown : تصفح الصفحات
                    Home/End : أول/آخر عنصر
                    F1 : هذه المساعدة
                    F2 : تبديل السيرفر

                    F4 : ملء الشاشة
                    F5 : القائمة الجانبية

                showNotification(helpMessage);

            togglePlayPause() {

            toggleFavorite() {

            nextChannel() {
                window.nextChannel();
            }
            
            prevChannel() {
                window.prevChannel();
            }
            
            manualServerSwitch() {
                window.manualServerSwitch();
            }
            
            toggleFullscreen() {
                window.toggleFullscreen();
            }
            
            toggleMenu() {
                window.toggleMenu();
            }
            
            stopPlayback() {

            }
        }

        // إنشاء نظام التحكم عن بعد
        const remoteControl = new RemoteControlSystem();

        // ==================== نظام منع التحميل المتكرر ====================
        let loadPrevention = {
            blockedServers: new Map(),
            
            canLoad: function(channelId, serverIndex) {
                const key = `${channelId}_${serverIndex}`;
                const now = Date.now();
                
                if (this.blockedServers.has(key)) {
                    const blockedUntil = this.blockedServers.get(key);
                    if (now < blockedUntil) {
                        return false;
                    } else {
                        this.blockedServers.delete(key);
                    }
                }
                return true;
            },
            
            blockServer: function(channelId, serverIndex) {
                const key = `${channelId}_${serverIndex}`;
                this.blockedServers.set(key, Date.now() + 120000);
            }
        };
        
        // ==================== التخزين المؤقت الضخم ====================
        let advancedCache = {
            cache: new Map(),
            maxSize: 2000 * 1024 * 1024,
            currentSize: 0,
            
            add: function(key, data, url) {
                const size = data.byteLength || 0;
                if (size > this.maxSize) return;
                
                while (this.currentSize + size > this.maxSize) {
                    const oldestKey = this.cache.keys().next().value;
                    const oldest = this.cache.get(oldestKey);
                    this.currentSize -= oldest.size;
                    this.cache.delete(oldestKey);
                }
                
                this.cache.set(key, {
                    data: data,
                    url: url,
                    size: size,
                    timestamp: Date.now()
                });
                this.currentSize += size;
            },
            
            get: function(key) {
                if (this.cache.has(key)) {
                    const item = this.cache.get(key);
                    item.timestamp = Date.now();
                    return item.data;
                }
                return null;
            },
            
            cleanup: function() {
                const entries = Array.from(this.cache.entries());
                entries.sort((a, b) => a[1].timestamp - b[1].timestamp);
                
                while (this.currentSize > this.maxSize * 0.8) {
                    const [key, item] = entries.shift();
                    this.currentSize -= item.size;
                    this.cache.delete(key);
                }
            }
        };
        
        // ==================== نظام استقرار البث ====================
        let streamStabilizer = {
            lastPosition: 0,
            lastTime: 0,
            freezeCount: 0,
            stallTimer: null,
            
            check: function() {
                if (!videoPlayer || !currentChannel) return true;
                
                const now = Date.now();
                const position = videoPlayer.currentTime;
                const readyState = videoPlayer.readyState;
                const networkState = videoPlayer.networkState;
                
                if (networkState === videoPlayer.NETWORK_IDLE && 
                    readyState < 3 && 
                    !videoPlayer.paused &&
                    videoPlayer.currentTime > 0) {
                    
                    this.handleStall();
                    return false;
                }
                
                if (this.lastTime > 0 && videoPlayer.currentTime > 0) {
                    const timeDiff = (now - this.lastTime) / 1000;
                    const posDiff = position - this.lastPosition;
                    
                    if (timeDiff > 2 && posDiff < 0.05 && !videoPlayer.paused && !videoPlayer.seeking) {
                        this.freezeCount++;
                        if (this.freezeCount >= 2) {
                            this.freezeCount = 0;
                            this.handleStall();
                            return false;
                        }
                    } else {
                        this.freezeCount = Math.max(0, this.freezeCount - 1);
                    }
                }
                
                this.lastPosition = position;
                this.lastTime = now;
                return true;
            },
            
            handleStall: function() {
                if (this.stallTimer) return;
                
                this.stallTimer = setTimeout(() => {
                    this.stallTimer = null;
                    
                    if (currentChannel && !reconnectSystem.isReconnecting) {

                                setTimeout(() => {

                            }
                        } else {
                            reconnectSystem.start();
                        }
                    }
                }, 2000);
            },
            
            reset: function() {
                this.lastPosition = 0;
                this.lastTime = 0;
                this.freezeCount = 0;
                if (this.stallTimer) {
                    clearTimeout(this.stallTimer);
                    this.stallTimer = null;
                }
            }
        };

        // ==================== نظام السحب والترتيب ====================
        function handleDragStart(e, item) {
            e.preventDefault(); e.stopPropagation();
            draggedItem = item;
            
            if (e.type === 'touchstart') {
                touchIdentifier = e.touches[0].identifier;
                dragStartY = e.touches[0].clientY;
            } else {
                dragStartY = e.clientY;
            }
            
            item.classList.add('dragging');
            document.body.style.overflow = 'hidden';
        }

        function handleDragMove(e) {
            if (!draggedItem) return;
            e.preventDefault(); e.stopPropagation();
            
            let clientY;
            if (e.type === 'touchmove') {
                for (let i = 0; i < e.touches.length; i++) {
                    if (e.touches[i].identifier === touchIdentifier) {
                        clientY = e.touches[i].clientY;
                        break;
                    }
                }
                if (!clientY) return;
            } else {
                clientY = e.clientY;
            }
            
            const items = [...document.querySelectorAll('.channel:not(.dragging)')];
            let closestItem = null;
            let closestDistance = Infinity;
            
            items.forEach(item => {
                const rect = item.getBoundingClientRect();
                const itemCenterY = rect.top + rect.height / 2;
                const distance = Math.abs(clientY - itemCenterY);
                
                if (distance < closestDistance && distance < 80) {
                    closestDistance = distance;
                    closestItem = item;
                }
            });
            
            if (closestItem && dragOverItem !== closestItem) {
                if (dragOverItem) dragOverItem.classList.remove('drag-over');
                dragOverItem = closestItem;
                dragOverItem.classList.add('drag-over');
            } else if (!closestItem && dragOverItem) {
                dragOverItem.classList.remove('drag-over');
                dragOverItem = null;
            }
        }

        function handleDragEnd(e) {
            if (!draggedItem) return;
            e.preventDefault(); e.stopPropagation();
            
            if (dragOverItem) {
                dragOverItem.classList.remove('drag-over');
                
                const items = [...document.querySelectorAll('.channel')];
                const fromIndex = items.indexOf(draggedItem);
                const toIndex = items.indexOf(dragOverItem);
                
                if (fromIndex !== -1 && toIndex !== -1 && fromIndex !== toIndex) {
                    const [movedChannel] = favoriteChannels.splice(fromIndex, 1);
                    favoriteChannels.splice(toIndex, 0, movedChannel);
                    
                    if (fromIndex < toIndex) {
                        dragOverItem.parentNode.insertBefore(draggedItem, dragOverItem.nextSibling);
                    } else {
                        dragOverItem.parentNode.insertBefore(draggedItem, dragOverItem);
                    }
                    
                    saveFavorites();
                    showNotification('📺 تم إعادة ترتيب القنوات');
                }
            }
            
            draggedItem.classList.remove('dragging');
            draggedItem = null;
            dragOverItem = null;
            touchIdentifier = null;
            document.body.style.overflow = '';
        }

        document.addEventListener('mousemove', handleDragMove);
        document.addEventListener('mouseup', handleDragEnd);
        document.addEventListener('touchmove', handleDragMove, { passive: false });
        document.addEventListener('touchend', handleDragEnd);
        document.addEventListener('touchcancel', handleDragEnd);

        // ==================== نظام EPG ====================
        async function loadEPG() {
            try {
                const response = await fetch(EPG_URL);
                const xmlText = await response.text();
                
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                
                const programmes = xmlDoc.querySelectorAll('programme');
                epgData = new Map();
                
                programmes.forEach(prog => {
                    const channel = prog.getAttribute('channel');
                    const start = prog.getAttribute('start');
                    const stop = prog.getAttribute('stop');
                    const title = prog.querySelector('title')?.textContent || '';
                    
                    if (!epgData.has(channel)) epgData.set(channel, []);
                    epgData.get(channel).push({
                        start: parseEPGTime(start),
                        stop: parseEPGTime(stop),
                        title: title
                    });
                });
                
                epgData.forEach((programs, channel) => {
                    programs.sort((a, b) => a.start - b.start);
                });
                
                epgLoaded = true;
                
                if (epgInterval) clearInterval(epgInterval);
                epgInterval = setInterval(loadEPG, 7200000);
            } catch (error) {
                epgLoaded = false;
            }
        }

        function parseEPGTime(timeStr) {
            const year = parseInt(timeStr.substring(0, 4));
            const month = parseInt(timeStr.substring(4, 6)) - 1;
            const day = parseInt(timeStr.substring(6, 8));
            const hour = parseInt(timeStr.substring(8, 10));
            const minute = parseInt(timeStr.substring(10, 12));
            const second = parseInt(timeStr.substring(12, 14));
            return new Date(year, month, day, hour, minute, second).getTime();
        }

        function getCurrentProgram(channelName) {
            if (!epgData || !epgLoaded) return null;
            const now = Date.now();
            const programs = epgData.get(channelName);
            if (!programs) return null;
            
            for (const prog of programs) {
                if (now >= prog.start && now < prog.stop) return prog.title;
            }
            for (const prog of programs) {
                if (prog.start > now) return `التالي: ${prog.title}`;
            }
            return null;
        }

        // ==================== تحميل الباقات ====================
        async function loadPackages() {
            try {
                let allContent = '';
                for (const url of M3U_URLS) {
                    try {
                        let fetchUrl = url;
                        if (fetchUrl.includes('github.com') && !fetchUrl.includes('raw.githubusercontent.com')) {
                            fetchUrl = fetchUrl.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
                        }
                        const response = await fetch(fetchUrl);
                        const content = await response.text();
                        allContent += content + '\n';
                    } catch (e) {}
                }
                if (allContent) { parseM3U(allContent); displayPackages(); setTimeout(() => loadAllChannels(), 100); }
            } catch (error) {
                packagesContainer.innerHTML = '<div style="text-align:center; padding:40px; color:#888;">Failed to load packages</div>';
            }
        }

        function parseM3U(content) {
            const lines = content.split('\n');
            const packagesMap = new Map();

            lines.forEach(line => {
                if (line.startsWith("#EXTINF")) {
                    const g = line.match(/group-title="([^"]+)"/);
                    const l = line.match(/tvg-logo="([^"]+)"/);
                    if (g) {
                        const category = g[1];
                        let logo = l ? l[1] : DEFAULT_ICONS.package;
                        if (!packagesMap.has(category)) {
                            packagesMap.set(category, {
                                id: category.replace(/[^a-z0-9]/gi, '-').toLowerCase(),
                                name: category,
                                icon: logo,
                                channels: []
                            });
                        }
                    }
                }
            });
            
            PACKAGES = Array.from(packagesMap.values());
            PACKAGES.unshift({ id: 'favorites', name: '⭐ Favorites', icon: 'https://j.top4top.io/p_3697ixeq31.png', channels: [] });
        }

                        </div>
                        <img src="${packageIcon}" onerror="this.src='${DEFAULT_ICONS.favorite}'; this.onerror=null;">
                        <div class="package-name">${pkg.name}</div>
                    `;
                } else {
                    div.innerHTML = `<img src="${packageIcon}" onerror="this.src='${DEFAULT_ICONS.package}'; this.onerror=null;"><div class="package-name">${pkg.name}</div>`;
                }
                div.onclick = () => openPackage(pkg.id);
                packagesContainer.appendChild(div);
            });
            
            // تحديث قائمة العناصر القابلة للتركيز
            remoteControl.updateFocusableList();
        }

        async function loadAllChannels() {
            const promises = PACKAGES.map(pkg => {
                if (pkg.id !== 'favorites') return loadChannelsForPackage(pkg);
                return Promise.resolve();
            });
            await Promise.all(promises);
        }

        async function loadChannelsForPackage(pkg) {
            try {
                let allChannels = [];
                for (const url of M3U_URLS) {
                    try {
                        let fetchUrl = url;
                        if (fetchUrl.includes('github.com') && !fetchUrl.includes('raw.githubusercontent.com')) {
                            fetchUrl = fetchUrl.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
                        }

                        const response = await fetch(fetchUrl);
                        const content = await response.text();
                        const lines = content.split('\n');
                        
                        let currentChannel = null;
                        let currentUrls = [];

                        for (let i = 0; i < lines.length; i++) {
                            const line = lines[i].trim();

                            if (line.startsWith('#EXTINF:')) {
                                if (currentChannel && currentUrls.length > 0) {
                                    currentChannel.urls = [...currentUrls];
                                    allChannels.push(currentChannel);
                                }

                                const g = line.match(/group-title="([^"]+)"/);
                                const l = line.match(/tvg-logo="([^"]+)"/);
                                const nameMatch = line.match(/,(.+)$/);
                                
                                let category = g ? g[1] : 'General';
                                if (category === pkg.name) {
                                    let name = nameMatch ? nameMatch[1].trim() : 'Channel';
                                    let logo = l ? l[1] : DEFAULT_ICONS.channel;
                                    name = name.replace(/#####/g, '').trim();
                                    
                                    currentChannel = {
                                        id: `${category}_${name.replace(/[^a-z0-9]/gi, '_')}_${Math.random().toString(36).substr(2, 5)}`,
                                        name: name,
                                        logo: logo,
                                        category: category,
                                        urls: []
                                    };
                                    currentUrls = [];
                                } else {
                                    currentChannel = null;
                                    currentUrls = [];
                                }
                            }
                            else if (line && !line.startsWith('#') && currentChannel) {
                                if (line.startsWith('http')) currentUrls.push(line);
                            }
                        }

                        if (currentChannel && currentUrls.length > 0) {
                            currentChannel.urls = [...currentUrls];
                            allChannels.push(currentChannel);
                        }
                    } catch (e) {}
                }
                
                const uniqueChannels = new Map();
                allChannels.forEach(ch => {
                    if (!uniqueChannels.has(ch.name)) {
                        uniqueChannels.set(ch.name, ch);
                    } else {
                        const existing = uniqueChannels.get(ch.name);
                        existing.urls = [...new Set([...existing.urls, ...ch.urls])];
                        if (ch.logo && ch.logo !== DEFAULT_ICONS.channel) existing.logo = ch.logo;
                    }
                });
                
                pkg.channels = Array.from(uniqueChannels.values());
            } catch (error) {
                pkg.channels = [];
            }
        }

        window.openPackage = async function(packageId) {
            if (packageId === 'favorites') { showFavorites(); return; }
            const pkg = PACKAGES.find(p => p.id === packageId);
            if (!pkg) return;

            currentPackageData = pkg;
            mainContent.style.display = 'none';
            playerSection.classList.add('active');
            comprehensiveIndicator.classList.add('visible');
            history.pushState({ page: 'channels' }, null, location.href);
            
            if (pkg.channels.length === 0) await loadChannelsForPackage(pkg);
            displayChannels(pkg.channels, false);
            
            remoteControl.setMode('channels');
        };

        function displayChannels(channels, isFavoriteView = false) {
            channelsList.innerHTML = '';
            channels.forEach(channel => channelsList.appendChild(createChannelElement(channel, isFavoriteView)));
            remoteControl.updateFocusableList();
        }
        
        function showFavorites() {
            if (favoriteChannels.length === 0) {
                channelsList.innerHTML = '<div class="empty-favorites"><i class="fas fa-star"></i>No favorite channels yet<br><span style="font-size:14px; color:#444;">Click the star on any channel to add</span></div>';
                return;
            }
            currentPackageData = { id: 'favorites', channels: favoriteChannels };
            mainContent.style.display = 'none';
            playerSection.classList.add('active');
            comprehensiveIndicator.classList.add('visible');
            displayChannels(favoriteChannels, true);
            remoteControl.setMode('channels');
        }

        // ==================== تشغيل القناة ====================
        window.playChannel = function(channel) {
            if (!channel || !channel.urls || channel.urls.length === 0) return;

            reconnectSystem.stop();
            
            currentChannel = channel;
            if (currentPackageData) {
                currentChannelIndex = currentPackageData.channels.findIndex(ch => ch.id === channel.id);
            }
            
            showChannelNameOnce(channel.name);
            
            if (serverLockSystem.locked && serverLockSystem.currentServer >= 0) {
                currentServerIndex = serverLockSystem.currentServer;
            } else {
                currentServerIndex = 0;
                serverLockSystem.setServer(channel.id, currentServerIndex);
            }
            
            serverNumberSpan.textContent = currentServerIndex + 1;
            playCurrentServer();
            updateChannelUI(channel, 'playing');
            setTimeout(updateEPGDisplay, 1000);
        };

        function playCurrentServer(isReconnect = false) {
            if (!currentChannel || !currentChannel.urls || !currentChannel.urls.length) return;
            
            const serverIndex = currentServerIndex;
            const url = currentChannel.urls[serverIndex];
            
            if (!loadPrevention.canLoad(currentChannel.id, serverIndex)) {
                showNotification('⚠️ Server busy, trying next...');
                changeServer();
                return;
            }
            
            channelLoading.classList.add('active');
            stopPlayback();
            
            const timeoutId = setTimeout(() => {
                if (channelLoading.classList.contains('active')) {
                    if (isReconnect) {
                        reconnectSystem.attemptReconnect();
                    } else if (serverLockSystem.locked) {
                        const needSwitch = serverLockSystem.recordFailure();
                        if (needSwitch && currentChannel.urls.length > 1) {
                            changeServer();
                        } else {
                            playCurrentServer();
                        }
                    } else {
                        changeServer();
                    }
                }
            }, 180000);

            if (Hls.isSupported()) {
                try {
                    hls = new Hls(HLS_CONFIG);
                    
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        clearTimeout(timeoutId);
                        if (serverLockSystem.locked) serverLockSystem.recordSuccess();
                        startMonitoring();
                        if (hls.levels.length > 0) hls.currentLevel = 0;
                        videoPlayer.play().catch(() => { 
                            if (serverLockSystem.locked) serverLockSystem.recordFailure();
                        });
                        
                        reconnectSystem.onPlaybackStarted();
                    });
                    
                    hls.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            clearTimeout(timeoutId);
                            
                            if (isReconnect) {
                                reconnectSystem.attemptReconnect();
                            } else if (serverLockSystem.locked) {
                                const needSwitch = serverLockSystem.recordFailure();
                                if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                                    try { hls.recoverMediaError(); } catch(e) {}
                                } else if (needSwitch && currentChannel.urls.length > 1) {
                                    changeServer();
                                } else if (!needSwitch) {
                                    setTimeout(() => playCurrentServer(), 2000);
                                }
                            } else {
                                if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                                    changeServer();
                                } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                                    try { hls.recoverMediaError(); } catch(e) {}
                                } else {
                                    changeServer();
                                }
                            }
                        }
                    });
                    
                    hls.on(Hls.Events.FRAG_LOADED, (event, data) => {
                        if (data.frag && data.frag.data) {
                            const key = `${currentChannel.id}_${serverIndex}_${data.frag.sn}`;
                            advancedCache.add(key, data.frag.data, data.frag.url);
                        }
                    });
                    
                    hls.loadSource(url);
                    hls.attachMedia(videoPlayer);
                    
                    videoPlayer.onplaying = () => {
                        clearTimeout(timeoutId);
                        channelLoading.classList.remove('active');
                        if (serverLockSystem.locked) serverLockSystem.recordSuccess();
                        reconnectSystem.onPlaybackStarted();
                    };
                    
                    videoPlayer.onwaiting = () => {
                        channelLoading.classList.add('active');
                        setTimeout(() => {
                            if (videoPlayer.readyState < 3 && videoPlayer.currentTime > 0 && !reconnectSystem.isReconnecting) {
                                reconnectSystem.start();
                            }
                        }, 5000);
                    };
                    
                    videoPlayer.onerror = () => { 
                        if (serverLockSystem.locked) serverLockSystem.recordFailure();
                        if (!reconnectSystem.isReconnecting) {
                            reconnectSystem.start();
                        }
                    };
                    
                    videoPlayer.onstalled = () => {
                        if (!reconnectSystem.isReconnecting && videoPlayer.currentTime > 0) {
                            reconnectSystem.start();
                        }
                    };
                    
                } catch (e) {
                    clearTimeout(timeoutId);
                    if (!reconnectSystem.isReconnecting) {
                        reconnectSystem.start();
                    }
                }
                
            } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                videoPlayer.src = url;
                
                videoPlayer.onloadedmetadata = () => {
                    clearTimeout(timeoutId);
                    if (serverLockSystem.locked) serverLockSystem.recordSuccess();
                    startMonitoring();
                    reconnectSystem.onPlaybackStarted();
                };
                
                videoPlayer.onerror = () => {
                    clearTimeout(timeoutId);
                    if (isReconnect) {
                        reconnectSystem.attemptReconnect();
                    } else if (serverLockSystem.locked) {
                        const needSwitch = serverLockSystem.recordFailure();
                        if (needSwitch && currentChannel.urls.length > 1) changeServer();
                    } else { changeServer(); }
                };
                
                videoPlayer.play().catch(() => { 
                    clearTimeout(timeoutId); 
                    if (serverLockSystem.locked) serverLockSystem.recordFailure();
                    if (!reconnectSystem.isReconnecting) {
                        reconnectSystem.start();
                    }
                });
                
                videoPlayer.onplaying = () => {
                    clearTimeout(timeoutId);
                    channelLoading.classList.remove('active');
                    if (serverLockSystem.locked) serverLockSystem.recordSuccess();
                    reconnectSystem.onPlaybackStarted();
                };
                
                videoPlayer.onwaiting = () => {
                    channelLoading.classList.add('active');
                    setTimeout(() => {
                        if (videoPlayer.readyState < 3 && videoPlayer.currentTime > 0 && !reconnectSystem.isReconnecting) {
                            reconnectSystem.start();
                        }
                    }, 5000);
                };
                
                videoPlayer.onstalled = () => {
                    if (!reconnectSystem.isReconnecting && videoPlayer.currentTime > 0) {
                        reconnectSystem.start();
                    }
                };
            }
        }

        // ==================== تبديل السيرفر يدوياً ====================
        window.manualServerSwitch = function() {
            if (!currentChannel || !currentChannel.urls || currentChannel.urls.length <= 1) {
                showNotification('⚠️ No alternative servers available');
                return;
            }
            
            reconnectSystem.stop();
            serverLockSystem.reset();
            let newServerIndex = (currentServerIndex + 1) % currentChannel.urls.length;
            
            const maxAttempts = currentChannel.urls.length;
            let attempts = 0;
            
            while (attempts < maxAttempts) {
                if (loadPrevention.canLoad(currentChannel.id, newServerIndex)) break;
                newServerIndex = (newServerIndex + 1) % currentChannel.urls.length;
                attempts++;
            }
            
            if (newServerIndex === currentServerIndex) {
                showNotification('❌ All servers temporarily unavailable');
                return;
            }
            
            currentServerIndex = newServerIndex;
            serverNumberSpan.textContent = currentServerIndex + 1;
            serverLockSystem.setServer(currentChannel.id, currentServerIndex);
            showNotification(`🔄 Switching to server #${currentServerIndex + 1}`);
            playCurrentServer();
        };

        function changeServer() {
            if (!currentChannel || !currentChannel.urls || !currentChannel.urls.length) return;
            
            reconnectSystem.stop();
            serverLockSystem.reset();
            let newServerIndex = (currentServerIndex + 1) % currentChannel.urls.length;
            
            const maxAttempts = currentChannel.urls.length;
            let attempts = 0;
            
            while (attempts < maxAttempts) {
                if (loadPrevention.canLoad(currentChannel.id, newServerIndex)) break;
                newServerIndex = (newServerIndex + 1) % currentChannel.urls.length;
                attempts++;
            }
            
            if (newServerIndex === currentServerIndex) {
                channelLoading.classList.remove('active');
                showNotification('❌ All servers unavailable, retrying in 10s...');
                setTimeout(() => { loadPrevention.blockedServers.clear(); playChannel(currentChannel); }, 10000);
                return;
            }
            
            currentServerIndex = newServerIndex;
            serverNumberSpan.textContent = currentServerIndex + 1;
            serverLockSystem.setServer(currentChannel.id, currentServerIndex);
            playCurrentServer();
        }

        window.nextChannel = function() {
            if (!currentPackageData || !currentPackageData.channels.length) return;
            reconnectSystem.stop();
            let nextIndex = (currentChannelIndex + 1) % currentPackageData.channels.length;
            playChannel(currentPackageData.channels[nextIndex]);
        };

        window.prevChannel = function() {
            if (!currentPackageData || !currentPackageData.channels.length) return;
            reconnectSystem.stop();
            let prevIndex = currentChannelIndex - 1;
            if (prevIndex < 0) prevIndex = currentPackageData.channels.length - 1;
            playChannel(currentPackageData.channels[prevIndex]);
        };

        // ==================== نقرتين لتكبير الشاشة ====================
        function setupDoubleTap() {
            videoArea.addEventListener('touchstart', (e) => {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                if (tapLength < 300 && tapLength > 0) {
                    e.preventDefault();
                    videoArea.classList.add('double-tap');
                    setTimeout(() => videoArea.classList.remove('double-tap'), 200);
                    toggleFullscreen();
                }
                lastTap = currentTime;
            });
            
            videoArea.addEventListener('dblclick', (e) => {
                e.preventDefault();
                videoArea.classList.add('double-tap');
                setTimeout(() => videoArea.classList.remove('double-tap'), 200);
                toggleFullscreen();
            });
        }

        // ==================== الشاشة الكاملة ====================
        function enterFullscreen() {
            document.body.classList.add('fullscreen-mode');
            isFullscreen = true;
            fullscreenBtn.style.display = 'none';
            exitFullscreenBtn.style.display = 'flex';
            hideChannelName();
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            else if (document.documentElement.webkitRequestFullscreen) document.documentElement.webkitRequestFullscreen();
            else if (document.documentElement.msRequestFullscreen) document.documentElement.msRequestFullscreen();
        }

        function exitFullscreen() {
            document.body.classList.remove('fullscreen-mode');
            isFullscreen = false;
            fullscreenBtn.style.display = 'flex';
            exitFullscreenBtn.style.display = 'none';
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else if (document.msExitFullscreen) document.msExitFullscreen();
            if (currentChannel) showChannelNameOnce(currentChannel.name);
        }

        window.toggleFullscreen = function() { isFullscreen ? exitFullscreen() : enterFullscreen(); };

        function handleFullscreenChange() {
            const isFull = !!document.fullscreenElement || !!document.webkitFullscreenElement || 
                           !!document.mozFullScreenElement || !!document.msFullscreenElement;
            if (isFull) {
                document.body.classList.add('fullscreen-mode');
                isFullscreen = true;
                fullscreenBtn.style.display = 'none';
                exitFullscreenBtn.style.display = 'flex';
                hideChannelName();
            } else {
                document.body.classList.remove('fullscreen-mode');
                isFullscreen = false;
                fullscreenBtn.style.display = 'flex';
                exitFullscreenBtn.style.display = 'none';
                if (currentChannel) showChannelNameOnce(currentChannel.name);
            }
        }

        document.addEventListener('fullscreenchange', handleFullscreenChange);
        document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
        document.addEventListener('mozfullscreenchange', handleFullscreenChange);
        document.addEventListener('MSFullscreenChange', handleFullscreenChange);

        fullscreenBtn.addEventListener('click', toggleFullscreen);
        exitFullscreenBtn.addEventListener('click', exitFullscreen);
        setupDoubleTap();

        // ==================== بدء التطبيق ====================
        document.addEventListener('DOMContentLoaded', () => {
            addDNSPrefetch();
            loadFavorites();
            loadPackages();
            loadEPG();
            
            setInterval(() => advancedCache.cleanup(), 60000);
            
            setInterval(() => {
                const now = Date.now();
                loadPrevention.blockedServers.forEach((timestamp, key) => {
                    if (now > timestamp) loadPrevention.blockedServers.delete(key);
                });
            }, 60000);
            
            M3U_URLS.forEach(url => {
                const link = document.createElement('link');
                link.rel = 'preload';
                link.as = 'fetch';
                link.href = url;
                link.crossOrigin = 'anonymous';
                document.head.appendChild(link);
            });
            
            window.addEventListener('beforeunload', () => {
                if (bufferCheckInterval) clearInterval(bufferCheckInterval);
                if (epgInterval) clearInterval(epgInterval);
            });
            
            // بدء نظام التحكم عن بعد
            remoteControl.setMode('packages');
        });

        function addDNSPrefetch() {
            const domains = new Set();
            M3U_URLS.forEach(url => { try { domains.add(new URL(url).hostname); } catch (e) {} });
            
            domains.forEach(domain => {
                const link = document.createElement('link'); link.rel = 'dns-prefetch'; link.href = `//${domain}`; document.head.appendChild(link);
                const preconnect = document.createElement('link'); preconnect.rel = 'preconnect'; preconnect.href = `https://${domain}`; document.head.appendChild(preconnect);
            });
        }
    </script>
</body>
